# @package _global_

# Simplest LM-MIQP planning demo configuration
# No Habitat simulation required; only LLM and MIQP solver needed

# Task instruction (high-level instruction; does not specify agents—let the system assign via MIQP)
instruction: "Collect the red object from Room1 and explore all rooms"

# LLM configuration
llm:
  # API key (if empty, will attempt to read from planner/api_key.txt)
  api_key: null
  # LLM service endpoint
  base_url: "https://api.moonshot.cn/v1"
  # Model name
  model: "moonshot-v1-32k"
  # Maximum token count
  max_tokens: 1200

# Scene configuration (optional; currently uses default 2D scene)
scene:
  # Scene configuration can be added here
  pass
