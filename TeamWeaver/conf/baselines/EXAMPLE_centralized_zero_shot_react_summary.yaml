# @package _global_

defaults:
  - centralized_zero_shot_react_summary
  - override /planner@evaluation.planner: EXAMPLE_llm_centralized_motortoolsonly # This is an example, you should REWRITE in your config!
  - override /instruct@evaluation.planner.plan_config.instruct: zero_shot_centralized
  - _self_

# vllm overwrite
evaluation:
  planner:
    plan_config:
      llm:
        inference_mode: vllm
        host: localhost
        port: 8000
        generation_params:
          engine: "your-model-name" # This is an example, you should REWRITE in your config!

